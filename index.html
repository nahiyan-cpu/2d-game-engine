<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Live Simulation Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-xl tracking-tighter">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm transition">▶️ RUN GAME</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', 0x3b82f6)" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button onclick="addGameObject('Enemy', 0xef4444)" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button onclick="addGameObject('Block', 0x6b7280)" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <section class="flex-1 bg-gray-950 grid-bg relative cursor-crosshair">
            <canvas id="mainCanvas"></canvas>
        </section>

        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Properties Inspector</h2>
            <div id="inspector" class="space-y-4"><p class="text-gray-500 text-sm italic">Select object to edit.</p></div>
        </aside>
    </main>

    <footer class="h-56 bg-gray-800 border-t border-gray-700 p-4 flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Logic Builder</h2>
            <button onclick="addRule()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs">+ Add New Rule</button>
        </div>
        <div id="rulesContainer" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [], rules = [], selectedObj = null, isDragging = false;

        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 50, y: 50, w: 60, h: 60 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = '#' + obj.color.toString(16).padStart(6, '0');
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) { ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4); }
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            selectedObj = objects.find(o => e.clientX-rect.left >= o.x && e.clientX-rect.left <= o.x+o.w && e.clientY-rect.top >= o.y && e.clientY-rect.top <= o.y+o.h);
            updateInspector(); draw();
        });

        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) return container.innerHTML = '<p class="text-gray-500 text-sm">Select object.</p>';
            container.innerHTML = `
                <div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold mb-1">Name</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1 w-full" value="${selectedObj.name}" oninput="selectedObj.name=this.value"></div>
                <div class="grid grid-cols-2 gap-2">
                    ${['x','y','w','h'].map(k => `<div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold mb-1">${k.toUpperCase()}</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1 w-full" type="number" value="${selectedObj[k]}" oninput="selectedObj.${k}=parseInt(this.value); draw()"></div>`).join('')}
                </div>`;
        }

        function addRule() {
            rules.push({ id: Date.now(), subj: 'Player', cond: 'Collides With', obj: 'Enemy', act: 'Game Over' });
            renderRules();
        }

        function renderRules() {
            document.getElementById('rulesContainer').innerHTML = rules.map(r => `
                <div class="bg-gray-900 p-2 rounded flex items-center gap-2 text-[10px] border border-gray-700">
                    <span>WHEN</span>
                    <select onchange="rules.find(x=>x.id==${r.id}).subj=this.value" class="bg-gray-800 text-white p-1"><option>Player</option><option>Enemy</option></select>
                    <select onchange="rules.find(x=>x.id==${r.id}).cond=this.value" class="bg-gray-800 text-white p-1"><option>Collides With</option></select>
                    <select onchange="rules.find(x=>x.id==${r.id}).obj=this.value" class="bg-gray-800 text-white p-1"><option>Enemy</option><option>Block</option></select>
                    <span>THEN</span>
                    <select onchange="rules.find(x=>x.id==${r.id}).act=this.value" class="bg-gray-800 text-white p-1"><option>Game Over</option><option>Destroy</option></select>
                    <button onclick="rules = rules.filter(x=>x.id!=${r.id}); renderRules()" class="ml-auto text-red-400 font-bold px-2">❌</button>
                </div>
            `).join('');
        }

        document.getElementById('runBtn').onclick = () => {
            const modal = document.createElement("div");
            modal.id = "runModal";
            modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90";
            modal.innerHTML = `
                <div class="bg-neutral-900 border border-gray-700 w-[800px] h-[500px] flex flex-col shadow-2xl">
                    <div class="h-12 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-700">
                        <span class="font-bold text-sm">Simulation Running</span>
                        <button onclick="document.getElementById('runModal').remove(); window.game.destroy(true);" class="bg-red-700 px-3 py-1 rounded text-xs font-bold">❌ Close</button>
                    </div>
                    <div id="phaserContainer" class="flex-1 w-full h-full"></div>
                </div>
            `;
            document.body.appendChild(modal);

            window.game = new Phaser.Game({
                type: Phaser.AUTO, width: 800, height: 450, parent: 'phaserContainer',
                physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
                scene: {
                    create: function() {
                        this.cursors = this.input.keyboard.createCursorKeys();
                        this.physics.world.setBounds(0, 0, 800, 450);
                        
                        // Map our objects
                        const physicsObjects = {};
                        objects.forEach((o, i) => {
                            let s = this.physics.add.sprite(o.x + o.w/2, o.y + o.h/2, null).setDisplaySize(o.w, o.h).setTint(o.color);
                            if(o.name !== 'Player') s.setImmovable(true);
                            else { s.setCollideWorldBounds(true); this.player = s; }
                            physicsObjects[o.name + i] = s;
                        });

                        // Interpret Rules
                        rules.forEach(r => {
                            if(r.cond === 'Collides With' && r.act === 'Game Over') {
                                this.physics.add.collider(this.player, Object.values(physicsObjects), () => {
                                    this.physics.pause();
                                    this.add.text(400, 225, 'GAME OVER', {fontSize: '50px', color: '#ff0000'}).setOrigin(0.5);
                                });
                            }
                        });
                    },
                    update: function() {
                        if(this.player) {
                            if (this.cursors.left.isDown) this.player.setVelocityX(-200);
                            else if (this.cursors.right.isDown) this.player.setVelocityX(200);
                            else this.player.setVelocityX(0);
                            if (this.cursors.up.isDown && this.player.body.touching.down) this.player.setVelocityY(-400);
                        }
                    }
                }
            });
        };
        window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); };
        window.onresize();
    </script>
</body>
</html>
