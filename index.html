<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-obj { transition: border 0.2s; }
        .selected-obj { border: 2px solid #60a5fa !important; box-shadow: 0 0 10px #60a5fa; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden" x-data="engine()">

    <!-- Top Bar -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-lg">ZenithEngine</h1>
        <div class="flex gap-2">
            <button @click="runGame()" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded font-bold">▶️ RUN GAME</button>
            <button @click="exportGame()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded">💾 Export</button>
        </div>
    </header>

    <!-- Workspace -->
    <div class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="font-bold mb-4 uppercase text-xs">Add Objects</h2>
            <button @click="addObject('player')" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button @click="addObject('enemy')" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button @click="addObject('block')" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <section id="workspace" class="flex-1 bg-gray-950 grid-bg relative" @click.self="selected = null">
            <template x-for="obj in objects" :key="obj.id">
                <div class="absolute canvas-obj cursor-pointer flex items-center justify-center font-bold text-[10px]"
                     :class="selected?.id === obj.id ? 'selected-obj' : 'border border-gray-600'"
                     :style="`left: ${obj.x}px; top: ${obj.y}px; width: ${obj.w}px; height: ${obj.h}px; background: ${obj.color}`"
                     @click.stop="selected = obj">
                     <span x-text="obj.name"></span>
                </div>
            </template>
        </section>

        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="font-bold mb-4 uppercase text-xs">Properties</h2>
            <div x-show="selected" class="space-y-3">
                <input x-model="selected.name" class="w-full bg-gray-900 p-2 rounded text-sm" placeholder="Name">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" x-model.number="selected.x" class="bg-gray-900 p-2 rounded" placeholder="X">
                    <input type="number" x-model.number="selected.y" class="bg-gray-900 p-2 rounded" placeholder="Y">
                    <input type="number" x-model.number="selected.w" class="bg-gray-900 p-2 rounded" placeholder="W">
                    <input type="number" x-model.number="selected.h" class="bg-gray-900 p-2 rounded" placeholder="H">
                </div>
                <input type="number" x-model.number="selected.speed" class="w-full bg-gray-900 p-2 rounded" placeholder="Speed">
            </div>
            <div x-show="!selected" class="text-gray-500 italic text-sm">Select an object to edit.</div>
        </aside>
    </div>

    <!-- Phaser Modal -->
    <div id="game-modal" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
        <div class="h-10 bg-gray-800 flex justify-end px-4 items-center">
            <button @click="stopGame()" class="text-red-500 font-bold">CLOSE [ESC]</button>
        </div>
        <div id="game-container" class="flex-1"></div>
    </div>

    <script>
        function engine() {
            return {
                objects: [],
                selected: null,
                addObject(type) {
                    const colors = { player: '#3b82f6', enemy: '#ef4444', block: '#4b5563' };
                    this.objects.push({ id: Date.now(), type, name: type, x: 50, y: 50, w: 50, h: 50, speed: 200, color: colors[type] });
                },
                runGame() {
                    document.getElementById('game-modal').classList.remove('hidden');
                    const config = {
                        type: Phaser.AUTO,
                        parent: 'game-container',
                        width: window.innerWidth,
                        height: window.innerHeight - 40,
                        physics: { default: 'arcade', arcade: { gravity: { y: 300 } } },
                        scene: {
                            create() {
                                const scene = this;
                                const objs = JSON.parse(JSON.stringify(Alpine.store('engine').objects));
                                // In a real app, map these to physics sprites
                                this.player = this.physics.add.sprite(100, 100, 'player'); 
                                this.cursors = this.input.keyboard.createCursorKeys();
                            },
                            update() {
                                if (this.cursors.left.isDown) this.player.setVelocityX(-200);
                                else if (this.cursors.right.isDown) this.player.setVelocityX(200);
                                else this.player.setVelocityX(0);
                            }
                        }
                    };
                    new Phaser.Game(config);
                },
                stopGame() { document.getElementById('game-modal').classList.add('hidden'); location.reload(); },
                exportGame() { /* Logic for downloading innerHTML */ }
            }
        }
        document.addEventListener('alpine:init', () => Alpine.store('engine', { objects: [] }));
    </script>
</body>
</html>
