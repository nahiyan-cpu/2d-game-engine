<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Pro Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Top Toolbar -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-xl tracking-tighter">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm transition">▶️ RUN GAME</button>
    </header>

    <!-- Main Dashboard -->
    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', '#3b82f6')" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button onclick="addGameObject('Enemy', '#ef4444')" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button onclick="addGameObject('Block', '#6b7280')" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <section class="flex-1 bg-gray-950 grid-bg relative cursor-crosshair">
            <canvas id="mainCanvas"></canvas>
        </section>

        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Properties Inspector</h2>
            <div id="inspector" class="space-y-4">
                <p class="text-gray-500 text-sm italic">Select an object to edit.</p>
            </div>
        </aside>
    </main>

    <!-- Logic Builder -->
    <footer class="h-56 bg-gray-800 border-t border-gray-700 p-4 flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Logic Builder</h2>
            <button onclick="addRule()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs">+ Add New Rule</button>
        </div>
        <div id="rulesContainer" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [], rules = [], selectedObj = null, isDragging = false;

        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 50, y: 50, w: 60, h: 60 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) {
                    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4);
                }
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            selectedObj = objects.find(o => e.clientX-rect.left >= o.x && e.clientX-rect.left <= o.x+o.w && e.clientY-rect.top >= o.y && e.clientY-rect.top <= o.y+o.h);
            isDragging = !!selectedObj;
            updateInspector(); draw();
        });

        canvas.addEventListener('mousemove', e => {
            if (isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - (selectedObj.w/2);
                selectedObj.y = e.clientY - rect.top - (selectedObj.h/2);
                updateInspector(); draw();
            }
        });

        canvas.addEventListener('mouseup', () => isDragging = false);

        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) return container.innerHTML = '<p class="text-gray-500 text-sm">Select an object.</p>';
            
            const field = (label, val, prop) => `
                <div class="flex flex-col">
                    <label class="text-[10px] text-gray-400 uppercase font-bold mb-1">${label}</label>
                    <input class="bg-gray-800 text-white border border-gray-700 rounded p-1 w-full block focus:outline-none focus:ring-1 focus:ring-blue-500" 
                           type="number" value="${val}" oninput="selectedObj.${prop}=parseInt(this.value); draw()">
                </div>`;
            
            container.innerHTML = `<div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold mb-1">Name</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1 w-full" value="${selectedObj.name}" oninput="selectedObj.name=this.value"></div>` + 
                                  field('X Pos', selectedObj.x, 'x') + field('Y Pos', selectedObj.y, 'y') + 
                                  field('Width', selectedObj.w, 'w') + field('Height', selectedObj.h, 'h');
        }

        // --- STABLE MODAL OVERLAY ---
        document.getElementById('runBtn').onclick = () => {
            let modal = document.getElementById("runModal");
            if(!modal) {
                modal = document.createElement("div");
                modal.id = "runModal";
                modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80";
                modal.innerHTML = `
                    <div class="bg-neutral-900 border border-gray-700 w-[800px] h-[500px] flex flex-col shadow-2xl">
                        <div class="h-12 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-700">
                            <span class="font-bold text-sm">Simulation Sandbox</span>
                            <button onclick="document.getElementById('runModal').remove(); window.game.destroy(true);" class="bg-red-700 hover:bg-red-600 px-3 py-1 rounded text-xs font-bold">❌ Close Simulation</button>
                        </div>
                        <div id="phaserContainer" class="flex-1 w-full h-full relative overflow-hidden"></div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            window.game = new Phaser.Game({
                type: Phaser.AUTO, width: 800, height: 450, parent: 'phaserContainer',
                scene: { create() { 
                    this.cameras.main.setBackgroundColor('#1f2937');
                    objects.forEach(obj => { this.add.rectangle(obj.x + obj.w/2, obj.y + obj.h/2, obj.w, obj.h, parseInt(obj.color.replace('#','0x'))); });
                    this.add.text(20, 20, 'Engine Simulation Active: ' + rules.length + ' Rules', {color:'#fff'});
                }}
            });
        };

        function addRule() { rules.push({ id: Date.now() }); renderRules(); }
        function renderRules() {
            document.getElementById('rulesContainer').innerHTML = rules.map(r => `
                <div class="bg-gray-900 p-2 rounded flex items-center gap-2 text-xs border border-gray-700">
                    <span>WHEN</span> <select class="bg-gray-800 text-white p-1"><option>Player</option></select> 
                    <span>THEN</span> <select class="bg-gray-800 text-white p-1"><option>Destroy</option></select>
                    <button onclick="rules = rules.filter(x=>x.id!=${r.id}); renderRules()" class="ml-auto text-red-400 font-bold px-2">❌</button>
                </div>
            `).join('');
        }

        window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); };
        window.onresize();
    </script>
</body>
</html>
