<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Production Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        /* Dark Theme Inputs */
        .property-input { @apply w-full bg-slate-900 border border-slate-700 text-white p-2 rounded text-sm focus:border-blue-500 focus:outline-none transition; }
        .property-label { @apply text-[10px] text-slate-400 uppercase font-bold tracking-wider; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-lg">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm transition">▶️ RUN GAME</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Asset Library -->
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', '#3b82f6')" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600 transition">Add Player</button>
            <button onclick="addGameObject('Enemy', '#ef4444')" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600 transition">Add Enemy</button>
            <button onclick="addGameObject('Block', '#6b7280')" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500 transition">Add Solid Block</button>
        </aside>

        <!-- Canvas -->
        <section class="flex-1 bg-gray-950 grid-bg relative">
            <canvas id="mainCanvas"></canvas>
        </section>

        <!-- Inspector -->
        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700 flex flex-col gap-4">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Properties Inspector</h2>
            <div id="inspector" class="flex flex-col gap-3">
                <p class="text-slate-500 text-sm italic">Select an object to edit.</p>
            </div>
        </aside>
    </main>

    <!-- Visual Scripting -->
    <footer class="h-64 bg-gray-800 border-t border-gray-700 p-4 flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Logic Builder (Event Sheet)</h2>
            <button onclick="addRule()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs transition">+ Add New Rule</button>
        </div>
        <div id="rulesContainer" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [];
        let rules = [];
        let selectedObj = null;
        let isDragging = false;

        // --- Core Engine Logic ---
        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 50, y: 50, w: 60, h: 60 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) {
                    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4);
                }
            });
        }

        // --- Drag & Selection ---
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            selectedObj = objects.find(o => mouseX >= o.x && mouseX <= o.x + o.w && mouseY >= o.y && mouseY <= o.y + o.h);
            isDragging = !!selectedObj;
            updateInspector(); draw();
        });

        canvas.addEventListener('mousemove', e => {
            if (isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - (selectedObj.w / 2);
                selectedObj.y = e.clientY - rect.top - (selectedObj.h / 2);
                updateInspector(); draw();
            }
        });

        canvas.addEventListener('mouseup', () => isDragging = false);

        // --- Inspector ---
        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) {
                container.innerHTML = '<p class="text-slate-500 text-sm">Select an object to edit.</p>';
                return;
            }
            container.innerHTML = `
                <div class="flex flex-col"><label class="property-label">Name</label><input class="property-input" value="${selectedObj.name}" oninput="selectedObj.name=this.value"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col"><label class="property-label">X Pos</label><input class="property-input" type="number" value="${selectedObj.x}" oninput="selectedObj.x=parseInt(this.value); draw()"></div>
                    <div class="flex flex-col"><label class="property-label">Y Pos</label><input class="property-input" type="number" value="${selectedObj.y}" oninput="selectedObj.y=parseInt(this.value); draw()"></div>
                    <div class="flex flex-col"><label class="property-label">Width</label><input class="property-input" type="number" value="${selectedObj.w}" oninput="selectedObj.w=parseInt(this.value); draw()"></div>
                    <div class="flex flex-col"><label class="property-label">Height</label><input class="property-input" type="number" value="${selectedObj.h}" oninput="selectedObj.h=parseInt(this.value); draw()"></div>
                </div>
            `;
        }

        // --- Logic Builder ---
        function addRule() {
            rules.push({ id: Date.now() });
            renderRules();
        }

        function renderRules() {
            const container = document.getElementById('rulesContainer');
            container.innerHTML = rules.map(rule => `
                <div class="bg-slate-900 p-2 rounded flex gap-2 items-center text-xs border border-slate-700">
                    <span>WHEN</span> <select class="bg-slate-800 p-1 rounded"><option>Player</option><option>Enemy</option></select>
                    <span>Collides</span> <select class="bg-slate-800 p-1 rounded"><option>Block</option><option>Coin</option></select>
                    <span>THEN</span> <select class="bg-slate-800 p-1 rounded"><option>Destroy</option><option>Score +10</option></select>
                    <button onclick="deleteRule(${rule.id})" class="ml-auto text-red-400 font-bold px-2 hover:text-red-300">❌</button>
                </div>
            `).join('');
        }

        function deleteRule(id) {
            rules = rules.filter(r => r.id !== id);
            renderRules();
        }

        // --- Initialization ---
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            draw();
        }
        window.onresize = resize;
        resize();

        document.getElementById('runBtn').onclick = () => alert("Sandbox Initialized: " + rules.length + " Rules Applied.");
    </script>
</body>
</html>
