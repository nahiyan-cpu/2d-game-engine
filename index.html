<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Production Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .property-label { @apply text-[10px] text-gray-400 uppercase font-bold mb-1; }
        .property-input { @apply w-full bg-gray-900 border border-gray-700 p-1.5 rounded text-sm text-white mb-3; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-lg">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm">▶️ RUN GAME</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Asset Library -->
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', '#3b82f6')" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button onclick="addGameObject('Enemy', '#ef4444')" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button onclick="addGameObject('Block', '#6b7280')" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <!-- Canvas -->
        <section class="flex-1 bg-gray-950 grid-bg relative">
            <canvas id="mainCanvas"></canvas>
        </section>

        <!-- Inspector -->
        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Properties</h2>
            <div id="inspector">
                <p class="text-gray-500 text-sm">Select an object to edit.</p>
            </div>
        </aside>
    </main>

    <!-- Visual Scripting -->
    <footer class="h-40 bg-gray-800 border-t border-gray-700 p-4 flex flex-col">
        <h2 class="text-xs font-bold text-gray-400 uppercase mb-3">Logic Builder</h2>
        <div class="flex gap-2 items-center bg-gray-900 p-3 rounded">
            <span>WHEN</span>
            <select class="bg-gray-700 p-1 rounded"><option>Player</option><option>Enemy</option></select>
            <span>Collides With</span>
            <select class="bg-gray-700 p-1 rounded"><option>Coin</option><option>Solid Block</option></select>
            <span>THEN</span>
            <select class="bg-gray-700 p-1 rounded"><option>Destroy</option><option>Game Over</option></select>
            <button class="bg-blue-600 px-3 py-1 rounded text-xs ml-auto">Add Rule</button>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [];
        let selectedObj = null;
        let isDragging = false;

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.onresize = resize;
        resize();

        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 50, y: 50, w: 60, h: 60, speed: 100 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) {
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4);
                }
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            selectedObj = objects.find(o => mouseX >= o.x && mouseX <= o.x + o.w && mouseY >= o.y && mouseY <= o.y + o.h);
            isDragging = !!selectedObj;
            updateInspector();
            draw();
        });

        canvas.addEventListener('mousemove', e => {
            if (isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - (selectedObj.w / 2);
                selectedObj.y = e.clientY - rect.top - (selectedObj.h / 2);
                updateInspector();
                draw();
            }
        });

        canvas.addEventListener('mouseup', () => isDragging = false);

        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Select an object to edit.</p>';
                return;
            }
            container.innerHTML = `
                <label class="property-label">Name</label>
                <input class="property-input" value="${selectedObj.name}" oninput="selectedObj.name=this.value">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="property-label">X Pos</label><input class="property-input" type="number" value="${selectedObj.x}" oninput="selectedObj.x=parseInt(this.value); draw()"></div>
                    <div><label class="property-label">Y Pos</label><input class="property-input" type="number" value="${selectedObj.y}" oninput="selectedObj.y=parseInt(this.value); draw()"></div>
                    <div><label class="property-label">Width</label><input class="property-input" type="number" value="${selectedObj.w}" oninput="selectedObj.w=parseInt(this.value); draw()"></div>
                    <div><label class="property-label">Height</label><input class="property-input" type="number" value="${selectedObj.h}" oninput="selectedObj.h=parseInt(this.value); draw()"></div>
                </div>
            `;
        }

        document.getElementById('runBtn').onclick = () => {
            alert("Exporting project to Phaser Sandbox... Starting simulation.");
        };
    </script>
</body>
</html>
