<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .code-font { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-xl tracking-tighter">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm transition">▶️ RUN GAME</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', 0x3b82f6)" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button onclick="addGameObject('Enemy', 0xef4444)" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button onclick="addGameObject('Block', 0x6b7280)" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <section class="flex-1 bg-gray-950 grid-bg relative cursor-crosshair">
            <canvas id="mainCanvas"></canvas>
        </section>

        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Properties Inspector</h2>
            <div id="inspector" class="space-y-4"><p class="text-gray-500 text-sm italic">Select object to edit.</p></div>
        </aside>
    </main>

    <footer class="h-56 bg-gray-900 border-t border-gray-700 p-4 flex flex-col">
        <h2 class="text-xs font-bold text-gray-400 uppercase mb-2">📜 GAME LOGIC SCRIPTER (JAVASCRIPT)</h2>
        <textarea id="codeEditor" class="w-full flex-1 bg-black text-green-400 p-3 code-font text-sm border border-gray-700 focus:outline-none focus:border-green-600 resize-none">// প্লেয়ার মুভমেন্ট
if (keys.left.isDown) player.setVelocityX(-200);
else if (keys.right.isDown) player.setVelocityX(200);
else player.setVelocityX(0);

// জাম্প
if (keys.up.isDown && player.body.touching.down) player.setVelocityY(-400);

// এনিমির সাথে সংঘর্ষ
physics.overlap(player, enemy, () => {
    showLoseScreen();
});</textarea>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [], selectedObj = null, isDragging = false, dragOffset = {x:0, y:0};

        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 100, y: 100, w: 60, h: 60 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = '#' + obj.color.toString(16).padStart(6, '0');
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) { ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4); }
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            selectedObj = objects.find(o => mx >= o.x && mx <= o.x + o.w && my >= o.y && my <= o.y + o.h);
            if(selectedObj) { isDragging = true; dragOffset = { x: mx - selectedObj.x, y: my - selectedObj.y }; }
            updateInspector(); draw();
        });

        window.addEventListener('mousemove', e => {
            if(isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - dragOffset.x;
                selectedObj.y = e.clientY - rect.top - dragOffset.y;
                updateInspector(); draw();
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) return container.innerHTML = '<p class="text-gray-500 text-sm italic">Select object to edit.</p>';
            container.innerHTML = `
                <div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold">Name</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1" value="${selectedObj.name}" oninput="selectedObj.name=this.value"></div>
                <div class="grid grid-cols-2 gap-2">
                    ${['x','y','w','h'].map(k => `<div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold">${k.toUpperCase()}</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1" type="number" value="${selectedObj[k]}" oninput="selectedObj.${k}=parseInt(this.value); draw()"></div>`).join('')}
                </div>`;
        }

        document.getElementById('runBtn').onclick = () => {
            const modal = document.createElement("div");
            modal.id = "runModal";
            modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-95";
            modal.innerHTML = `
                <div class="bg-neutral-900 border border-gray-700 w-[800px] h-[550px] flex flex-col shadow-2xl">
                    <div class="h-12 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-700">
                        <span class="font-bold text-sm">Live Simulation</span>
                        <button onclick="document.getElementById('runModal').remove(); window.game.destroy(true);" class="bg-red-700 px-3 py-1 rounded text-xs font-bold hover:bg-red-600">❌ Close Simulation</button>
                    </div>
                    <div id="phaserContainer" class="flex-1 w-full h-full"></div>
                </div>`;
            document.body.appendChild(modal);

            window.game = new Phaser.Game({
                type: Phaser.AUTO, width: 800, height: 500, parent: 'phaserContainer',
                physics: { default: 'arcade', arcade: { gravity: { y: 800 } } },
                scene: {
                    create: function() {
                        this.keys = this.input.keyboard.createCursorKeys();
                        const statics = this.physics.add.staticGroup();
                        const dynamics = this.physics.add.group();
                        
                        this.score = 0;
                        this.scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '24px', fill: '#ffffff' });

                        this.state = { player: null, enemy: null, physics: this.physics, keys: this.keys, score: 0 };

                        objects.forEach(o => {
                            let s = (o.name === 'Player') ? dynamics.create(o.x+o.w/2, o.y+o.h/2, null) : statics.create(o.x+o.w/2, o.y+o.h/2, null);
                            s.setDisplaySize(o.w, o.h).setTint(o.color);
                            if(o.name === 'Player') { s.setCollideWorldBounds(true); this.state.player = s; }
                            if(o.name === 'Enemy') this.state.enemy = s;
                        });

                        this.physics.add.collider(dynamics, statics);

                        this.updateScore = (points) => { this.score += points; this.scoreText.setText('Score: ' + this.score); };
                        this.showLoseScreen = () => {
                            this.physics.pause();
                            this.add.text(400, 250, 'GAME OVER\nFinal Score: ' + this.score, { fontSize: '50px', color: '#ff0000', align: 'center', backgroundColor: '#000' }).setOrigin(0.5);
                        };
                        
                        this.execScript = new Function('player', 'enemy', 'keys', 'physics', 'updateScore', 'showLoseScreen', document.getElementById('codeEditor').value);
                    },
                    update: function() {
                        try {
                            const { player, enemy, keys, physics } = this.state;
                            if (player) this.execScript(player, enemy, keys, physics, this.updateScore, this.showLoseScreen);
                        } catch(e) { console.warn("Logic Error:", e.message); }
                    }
                }
            });
        };
        window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); };
        window.onresize();
    </script>
</body>
</html>
