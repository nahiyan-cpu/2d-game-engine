<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithEngine | Pro Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        .grid-bg { background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between">
        <h1 class="font-bold text-xl tracking-tighter">ZenithEngine</h1>
        <button id="runBtn" class="bg-green-600 hover:bg-green-500 px-6 py-1 rounded font-bold text-sm transition">▶️ RUN GAME</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 p-4 border-r border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Object Library</h2>
            <button onclick="addGameObject('Player', 0x3b82f6)" class="w-full bg-blue-700 p-2 mb-2 rounded hover:bg-blue-600">Add Player</button>
            <button onclick="addGameObject('Enemy', 0xef4444)" class="w-full bg-red-700 p-2 mb-2 rounded hover:bg-red-600">Add Enemy</button>
            <button onclick="addGameObject('Block', 0x6b7280)" class="w-full bg-gray-600 p-2 mb-2 rounded hover:bg-gray-500">Add Solid Block</button>
        </aside>

        <section class="flex-1 bg-gray-950 grid-bg relative cursor-crosshair">
            <canvas id="mainCanvas"></canvas>
        </section>

        <aside class="w-72 bg-gray-800 p-4 border-l border-gray-700">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-4">Properties Inspector</h2>
            <div id="inspector" class="space-y-4"><p class="text-gray-500 text-sm italic">Select object to edit.</p></div>
        </aside>
    </main>

    <footer class="h-56 bg-gray-800 border-t border-gray-700 p-4 flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Logic Builder</h2>
            <button onclick="addRule()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs">+ Add New Rule</button>
        </div>
        <div id="rulesContainer" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let objects = [], rules = [], selectedObj = null, isDragging = false, dragOffset = {x:0, y:0};

        function addGameObject(name, color) {
            objects.push({ id: Date.now(), name, color, x: 100, y: 100, w: 60, h: 60 });
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objects.forEach(obj => {
                ctx.fillStyle = '#' + obj.color.toString(16).padStart(6, '0');
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                if(selectedObj === obj) { ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.strokeRect(obj.x-2, obj.y-2, obj.w+4, obj.h+4); }
            });
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            selectedObj = objects.find(o => mx >= o.x && mx <= o.x + o.w && my >= o.y && my <= o.y + o.h);
            if(selectedObj) { isDragging = true; dragOffset = { x: mx - selectedObj.x, y: my - selectedObj.y }; }
            updateInspector(); draw();
        });

        window.addEventListener('mousemove', e => {
            if(isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - dragOffset.x;
                selectedObj.y = e.clientY - rect.top - dragOffset.y;
                updateInspector(); draw();
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        function updateInspector() {
            const container = document.getElementById('inspector');
            if(!selectedObj) return container.innerHTML = '<p class="text-gray-500 text-sm italic">Select object to edit.</p>';
            container.innerHTML = `
                <div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold">Name</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1" value="${selectedObj.name}" oninput="selectedObj.name=this.value"></div>
                <div class="grid grid-cols-2 gap-2">
                    ${['x','y','w','h'].map(k => `<div class="flex flex-col"><label class="text-[10px] text-gray-400 uppercase font-bold">${k.toUpperCase()}</label><input class="bg-gray-800 text-white border border-gray-700 rounded p-1" type="number" value="${selectedObj[k]}" oninput="selectedObj.${k}=parseInt(this.value); draw()"></div>`).join('')}
                </div>`;
        }

        function addRule() {
            rules.push({ id: Date.now(), subj: 'Player', cond: 'Collides With', target: 'None', act: 'Destroy Target Object' });
            renderRules();
        }

        function renderRules() {
            const subjects = ["Player", "Enemy", "Solid/Block", "Coin", "Bullet", "Ghost", "Obstacle", "Boss Enemy"];
            const conditions = ["Collides With", "Presses Key (Up/Space)", "Presses Key (Left/Right)", "Reaches Score", "Is Out of Bounds", "Timer Reaches Limit", "Health Drops to 0"];
            const targets = ["None", "Player", "Enemy", "Solid/Block", "Coin", "Ghost", "Obstacle", "Boss Enemy", "Score 100"];
            const actions = ["Destroy Target Object", "Destroy Self", "Game Over (Show Red Screen)", "Add +10 to Score HUD", "Add +50 to Score HUD", "Decrease Life/Health by 1", "Increase Life/Health by 1", "Jump / Apply Bounce", "Move Automatically", "Restart Level"];

            document.getElementById('rulesContainer').innerHTML = rules.map(r => `
                <div class="bg-gray-900 p-2 rounded flex items-center gap-2 text-[9px] border border-gray-700">
                    <select class="bg-gray-800 text-white p-1" onchange="rules.find(x=>x.id==${r.id}).subj=this.value">${subjects.map(o=>`<option ${r.subj==o?'selected':''}>${o}</option>`).join('')}</select>
                    <select class="bg-gray-800 text-white p-1" onchange="rules.find(x=>x.id==${r.id}).cond=this.value">${conditions.map(o=>`<option ${r.cond==o?'selected':''}>${o}</option>`).join('')}</select>
                    <select class="bg-gray-800 text-white p-1" onchange="rules.find(x=>x.id==${r.id}).target=this.value">${targets.map(o=>`<option ${r.target==o?'selected':''}>${o}</option>`).join('')}</select>
                    <select class="bg-gray-800 text-white p-1" onchange="rules.find(x=>x.id==${r.id}).act=this.value">${actions.map(o=>`<option ${r.act==o?'selected':''}>${o}</option>`).join('')}</select>
                    <button onclick="rules = rules.filter(x=>x.id!=${r.id}); renderRules()" class="ml-auto text-red-400 font-bold px-2">❌</button>
                </div>
            `).join('');
        }

        document.getElementById('runBtn').onclick = () => {
            const modal = document.createElement("div");
            modal.id = "runModal";
            modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90";
            modal.innerHTML = `<div class="bg-neutral-900 border border-gray-700 w-[800px] h-[500px] flex flex-col shadow-2xl">
                <div class="h-12 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-700"><span class="font-bold text-sm">Simulation Running</span><button onclick="document.getElementById('runModal').remove(); window.game.destroy(true);" class="bg-red-700 px-3 py-1 rounded text-xs font-bold">❌ Close</button></div>
                <div id="phaserContainer" class="flex-1 w-full h-full"></div>
            </div>`;
            document.body.appendChild(modal);

            window.game = new Phaser.Game({
                type: Phaser.AUTO, width: 800, height: 450, parent: 'phaserContainer',
                physics: { default: 'arcade', arcade: { gravity: { y: 800 } } },
                scene: {
                    create: function() {
                        this.cursors = this.input.keyboard.createCursorKeys();
                        const statics = this.physics.add.staticGroup();
                        const dynamics = this.physics.add.group();

                        // 1. Instantiate all objects at correct coordinates first
                        objects.forEach(o => {
                            let s = (o.name === 'Player') ? dynamics.create(o.x + o.w/2, o.y + o.h/2, null) : statics.create(o.x + o.w/2, o.y + o.h/2, null);
                            s.setDisplaySize(o.w, o.h).setTint(o.color);
                            if(o.name === 'Player') { s.setCollideWorldBounds(true); this.player = s; }
                        });

                        // 2. Register collision rules AFTER objects are in place
                        this.physics.add.collider(dynamics, statics);
                        rules.forEach(r => {
                            if(r.act === 'Game Over (Show Red Screen)') {
                                this.physics.add.overlap(this.player, statics, () => {
                                    this.physics.pause();
                                    this.cameras.main.setBackgroundColor('#ff0000');
                                });
                            }
                        });
                    },
                    update: function() {
                        if(this.player) {
                            if (this.cursors.left.isDown) this.player.setVelocityX(-200);
                            else if (this.cursors.right.isDown) this.player.setVelocityX(200);
                            else this.player.setVelocityX(0);
                            if (this.cursors.up.isDown && this.player.body.touching.down) this.player.setVelocityY(-400);
                        }
                    }
                }
            });
        };
        window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); };
        window.onresize();
    </script>
</body>
</html>
